name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-c:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc cmake libsqlite3-dev libcurl4-openssl-dev libmicrohttpd-dev libcjson-dev

      - name: Configure CMake
        working-directory: backend
        run: cmake -S . -B build-ci

      - name: Build C backend
        working-directory: backend
        run: cmake --build build-ci

      - name: Run C tests
        working-directory: backend
        run: ctest --test-dir build-ci --verbose

  build-web:
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: frontend-web
        run: npm ci

      - name: Build web app
        working-directory: frontend-web
        run: npm run build

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend-web
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
